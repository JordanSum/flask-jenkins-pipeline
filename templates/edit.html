{% extends "base.html" %}

{% block title %}Edit Task — TaskFlow{% endblock %}

{% block body %}
<div class="edit-container">

    <a href="/" class="btn btn-ghost" style="margin-bottom: 24px; display: inline-flex;">
        <i class="fas fa-arrow-left"></i> Back to Tasks
    </a>

    <div class="edit-card">
        <h1 class="edit-card-title">
            <i class="fas fa-pen"></i> Edit Task
        </h1>

        <form action="/edit/{{ task.id }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="content">Task Content</label>
                <input
                    type="text"
                    name="content"
                    id="content"
                    class="form-input"
                    value="{{ task.content }}"
                    autocomplete="off"
                    autofocus
                    required
                />
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="/" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
